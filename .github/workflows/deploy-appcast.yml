name: Deploy Sparkle Appcast

on:
  push:
    branches: [main]
    paths:
      - 'docs/appcast.xml'
      - '.github/workflows/deploy-appcast.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare publish folder
        run: |
          mkdir -p publish
          cp docs/appcast.xml publish/appcast.xml
          cat > publish/index.html <<'EOF'
          <!doctype html>
          <html>
            <head><meta charset="utf-8"><title>Ursus Appcast</title></head>
            <body>Ursus Sparkle appcast</body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4